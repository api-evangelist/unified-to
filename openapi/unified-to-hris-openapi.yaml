        id:
          type: string
        investing_sections:
          $ref: '#/components/schemas/property_AccountingCashflow_investing_sections'
        name:
          type: string
        net_change_in_cash_amount:
          type: number
        operating_sections:
          $ref: '#/components/schemas/property_AccountingCashflow_operating_sections'
        raw:
          additionalProperties: true
          type: object
        start_at:
          format: date-time
          type: string
        updated_at:
          format: date-time
          type: string
      type: object
