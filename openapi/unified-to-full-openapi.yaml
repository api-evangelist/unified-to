        name:
          type: string
        sub_items:
          $ref: '#/components/schemas/property_AccountingBalancesheetItem_sub_items'
      type: object
    AccountingBalancesheets:
      items:
        $ref: '#/components/schemas/AccountingBalancesheet'
      type: array
    AccountingBill:
      properties:
        attachments:
          $ref: '#/components/schemas/property_AccountingBill_attachments'
        balance_amount:
          type: number
        bill_number:
          type: string
        cancelled_at:
          format: date-time
          type: string
        contact_id:
          type: string
        created_at:
          format: date-time
          type: string
        currency:
          type: string
        discount_amount:
          type: number
        due_at:
          format: date-time
          type: string
        id:
          type: string
        lineitems:
          $ref: '#/components/schemas/property_AccountingBill_lineitems'
        notes:
          type: string
        organization_id:
          type: string
        paid_amount:
          type: number
        paid_at:
          format: date-time
          type: string
        payment_collection_method:
          enum:
          - send_invoice
          - charge_automatically
          type: string
          x-speakeasy-unknown-values: allow
        posted_at:
          format: date-time
          type: string
        raw:
          additionalProperties: true
          type: object
        refund_amount:
          type: number
        refund_reason:
          type: string
        refunded_at:
          format: date-time
          type: string
        send:
          type: boolean
        status:
          enum:
          - DRAFT
          - VOIDED
          - AUTHORIZED
          - PAID
          - PARTIALLY_PAID
          - PARTIALLY_REFUNDED
          - REFUNDED
          - SUBMITTED
          - DELETED
          - OVERDUE
          type: string
          x-speakeasy-unknown-values: allow
        tax_amount:
          type: number
        total_amount:
          type: number
        updated_at:
          format: date-time
          type: string
        url:
          type: string
      type: object
    AccountingBills:
      items:
        $ref: '#/components/schemas/AccountingBill'
      type: array
