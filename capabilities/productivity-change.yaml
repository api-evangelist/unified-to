naftiko: 1.0.0-alpha2
info:
  label: Unified.to  API — change
  description: 'Unified.to  API — change. 2 operations. Lead operation: List all changes. Self-contained Naftiko capability
    covering one Unified To business surface.'
  tags:
  - Unified To
  - change
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNIFIED_TO_API_KEY: UNIFIED_TO_API_KEY
capability:
  consumes:
  - type: http
    namespace: productivity-change
    baseUri: https://api.unified.to
    description: Unified.to  API — change business capability. Self-contained, no shared references.
    resources:
    - name: task-connection_id-change
      path: /task/{connection_id}/change
      operations:
      - name: listtaskchanges
        method: GET
        description: List all changes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: number
        - name: offset
          in: query
          type: number
        - name: updated_gte
          in: query
          type: string
          description: Return only results whose updated date is equal or greater to this value (ISO-8601 / YYYY-MM-DDTHH:MM:SSZ
            format)
        - name: sort
          in: query
          type: string
        - name: order
          in: query
          type: string
        - name: query
          in: query
          type: string
          description: Query string to search. eg. email address or name
        - name: task_id
          in: query
          type: string
          description: The task ID to filter by (reference to TaskTask)
        - name: fields
          in: query
          type: array
          description: Fields to return
        - name: raw
          in: query
          type: string
          description: 'Raw parameters to include in the 3rd-party request. Encoded as a URL component. eg. raw parameters:
            foo=bar&zoo=bar -> raw=foo%3Dbar%26zoo%3Dbar'
        - name: connection_id
          in: path
          type: string
          description: ID of the connection
          required: true
    - name: task-connection_id-change-id
      path: /task/{connection_id}/change/{id}
      operations:
      - name: gettaskchange
        method: GET
        description: Retrieve a change
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: Fields to return
        - name: raw
          in: query
          type: string
          description: 'Raw parameters to include in the 3rd-party request. Encoded as a URL component. eg. raw parameters:
            foo=bar&zoo=bar -> raw=foo%3Dbar%26zoo%3Dbar'
        - name: connection_id
          in: path
          type: string
          description: ID of the connection
          required: true
        - name: id
          in: path
          type: string
          description: ID of the Change
          required: true
    authentication:
      type: apikey
      key: authorization
      value: '{{env.UNIFIED_TO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: productivity-change-rest
    port: 8080
    description: REST adapter for Unified.to  API — change. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/task/{connection-id}/change
      name: task-connection-id-change
      description: REST surface for task-connection_id-change.
      operations:
      - method: GET
        name: listtaskchanges
        description: List all changes
        call: productivity-change.listtaskchanges
        with:
          limit: rest.limit
          offset: rest.offset
          updated_gte: rest.updated_gte
          sort: rest.sort
          order: rest.order
          query: rest.query
          task_id: rest.task_id
          fields: rest.fields
          raw: rest.raw
          connection_id: rest.connection_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/task/{connection-id}/change/{id}
      name: task-connection-id-change-id
      description: REST surface for task-connection_id-change-id.
      operations:
      - method: GET
        name: gettaskchange
        description: Retrieve a change
        call: productivity-change.gettaskchange
        with:
          fields: rest.fields
          raw: rest.raw
          connection_id: rest.connection_id
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: productivity-change-mcp
    port: 9090
    transport: http
    description: MCP adapter for Unified.to  API — change. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-all-changes
      description: List all changes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: productivity-change.listtaskchanges
      with:
        limit: tools.limit
        offset: tools.offset
        updated_gte: tools.updated_gte
        sort: tools.sort
        order: tools.order
        query: tools.query
        task_id: tools.task_id
        fields: tools.fields
        raw: tools.raw
        connection_id: tools.connection_id
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-change
      description: Retrieve a change
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: productivity-change.gettaskchange
      with:
        fields: tools.fields
        raw: tools.raw
        connection_id: tools.connection_id
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
