naftiko: 1.0.0-alpha2
info:
  label: Unified.to  API — enrich
  description: 'Unified.to  API — enrich. 2 operations. Lead operation: Retrieve Enrichment Information for a Company. Self-contained
    Naftiko capability covering one Unified To business surface.'
  tags:
  - Unified To
  - enrich
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNIFIED_TO_API_KEY: UNIFIED_TO_API_KEY
capability:
  consumes:
  - type: http
    namespace: full-enrich
    baseUri: https://api.unified.to
    description: Unified.to  API — enrich business capability. Self-contained, no shared references.
    resources:
    - name: enrich-connection_id-company
      path: /enrich/{connection_id}/company
      operations:
      - name: listenrichcompanies
        method: GET
        description: Retrieve Enrichment Information for a Company
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domain
          in: query
          type: string
          description: The domain of the company to search
        - name: name
          in: query
          type: string
          description: The name of the company to search
        - name: connection_id
          in: path
          type: string
          description: ID of the connection
          required: true
    - name: enrich-connection_id-person
      path: /enrich/{connection_id}/person
      operations:
      - name: listenrichpeople
        method: GET
        description: Retrieve Enrichment Information for a Person
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: email
          in: query
          type: string
          description: The email of the person to search
        - name: twitter
          in: query
          type: string
          description: The twitter handle of the person to search
        - name: name
          in: query
          type: string
          description: The name of the person to search
        - name: linkedin_url
          in: query
          type: string
          description: The LinkedIn URL of the person to search
        - name: company_name
          in: query
          type: string
          description: The name of the company the person is associated with.  Not valid by itself.
        - name: connection_id
          in: path
          type: string
          description: ID of the connection
          required: true
    authentication:
      type: apikey
      key: authorization
      value: '{{env.UNIFIED_TO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: full-enrich-rest
    port: 8080
    description: REST adapter for Unified.to  API — enrich. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/enrich/{connection-id}/company
      name: enrich-connection-id-company
      description: REST surface for enrich-connection_id-company.
      operations:
      - method: GET
        name: listenrichcompanies
        description: Retrieve Enrichment Information for a Company
        call: full-enrich.listenrichcompanies
        with:
          domain: rest.domain
          name: rest.name
          connection_id: rest.connection_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/enrich/{connection-id}/person
      name: enrich-connection-id-person
      description: REST surface for enrich-connection_id-person.
      operations:
      - method: GET
        name: listenrichpeople
        description: Retrieve Enrichment Information for a Person
        call: full-enrich.listenrichpeople
        with:
          email: rest.email
          twitter: rest.twitter
          name: rest.name
          linkedin_url: rest.linkedin_url
          company_name: rest.company_name
          connection_id: rest.connection_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: full-enrich-mcp
    port: 9090
    transport: http
    description: MCP adapter for Unified.to  API — enrich. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: retrieve-enrichment-information-company
      description: Retrieve Enrichment Information for a Company
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: full-enrich.listenrichcompanies
      with:
        domain: tools.domain
        name: tools.name
        connection_id: tools.connection_id
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-enrichment-information-person
      description: Retrieve Enrichment Information for a Person
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: full-enrich.listenrichpeople
      with:
        email: tools.email
        twitter: tools.twitter
        name: tools.name
        linkedin_url: tools.linkedin_url
        company_name: tools.company_name
        connection_id: tools.connection_id
      outputParameters:
      - type: object
        mapping: $.
