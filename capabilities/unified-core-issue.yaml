naftiko: 1.0.0-alpha2
info:
  label: Unified.to  API — issue
  description: 'Unified.to  API — issue. 2 operations. Lead operation: List support issues. Self-contained Naftiko capability
    covering one Unified To business surface.'
  tags:
  - Unified To
  - issue
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNIFIED_TO_API_KEY: UNIFIED_TO_API_KEY
capability:
  consumes:
  - type: http
    namespace: unified-core-issue
    baseUri: https://api.unified.to
    description: Unified.to  API — issue business capability. Self-contained, no shared references.
    resources:
    - name: unified-issue
      path: /unified/issue
      operations:
      - name: listunifiedissues
        method: GET
        description: List support issues
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: number
        - name: offset
          in: query
          type: number
        - name: updated_gte
          in: query
          type: string
          description: Return only results whose updated date is equal or greater to this value (ISO-8601 / YYYY-MM-DDTHH:MM:SSZ
            format)
        - name: sort
          in: query
          type: string
        - name: order
          in: query
          type: string
    - name: unified-issue-id
      path: /unified/issue/{id}
      operations:
      - name: getunifiedissue
        method: GET
        description: Retrieve support issue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: ID of the Issue
          required: true
    authentication:
      type: apikey
      key: authorization
      value: '{{env.UNIFIED_TO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: unified-core-issue-rest
    port: 8080
    description: REST adapter for Unified.to  API — issue. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/unified/issue
      name: unified-issue
      description: REST surface for unified-issue.
      operations:
      - method: GET
        name: listunifiedissues
        description: List support issues
        call: unified-core-issue.listunifiedissues
        with:
          limit: rest.limit
          offset: rest.offset
          updated_gte: rest.updated_gte
          sort: rest.sort
          order: rest.order
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/unified/issue/{id}
      name: unified-issue-id
      description: REST surface for unified-issue-id.
      operations:
      - method: GET
        name: getunifiedissue
        description: Retrieve support issue
        call: unified-core-issue.getunifiedissue
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: unified-core-issue-mcp
    port: 9090
    transport: http
    description: MCP adapter for Unified.to  API — issue. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-support-issues
      description: List support issues
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: unified-core-issue.listunifiedissues
      with:
        limit: tools.limit
        offset: tools.offset
        updated_gte: tools.updated_gte
        sort: tools.sort
        order: tools.order
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-support-issue
      description: Retrieve support issue
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: unified-core-issue.getunifiedissue
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
