      - method: DELETE
        name: removeunifiedwebhook
        description: Remove Webhook Subscription
        call: full-webhook.removeunifiedwebhook
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getunifiedwebhook
        description: Retrieve Webhook by Its Id
        call: full-webhook.getunifiedwebhook
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patchunifiedwebhook
        description: Update Webhook Subscription
        call: full-webhook.patchunifiedwebhook
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateunifiedwebhook
        description: Update Webhook Subscription
        call: full-webhook.updateunifiedwebhook
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/unified/webhook/{id}/trigger
      name: unified-webhook-id-trigger
      description: REST surface for unified-webhook-id-trigger.
      operations:
      - method: PATCH
        name: patchunifiedwebhooktrigger
        description: Trigger Webhook
        call: full-webhook.patchunifiedwebhooktrigger
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateunifiedwebhooktrigger
        description: Trigger Webhook
        call: full-webhook.updateunifiedwebhooktrigger
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
