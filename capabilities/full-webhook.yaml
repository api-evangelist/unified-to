naftiko: 1.0.0-alpha2
info:
  label: Unified.to  API — webhook
  description: 'Unified.to  API — webhook. 8 operations. Lead operation: Returns All Registered Webhooks. Self-contained Naftiko
    capability covering one Unified To business surface.'
  tags:
  - Unified To
  - webhook
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNIFIED_TO_API_KEY: UNIFIED_TO_API_KEY
capability:
  consumes:
  - type: http
    namespace: full-webhook
    baseUri: https://api.unified.to
    description: Unified.to  API — webhook business capability. Self-contained, no shared references.
    resources:
    - name: unified-webhook
      path: /unified/webhook
      operations:
      - name: listunifiedwebhooks
        method: GET
        description: Returns All Registered Webhooks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: number
        - name: offset
          in: query
          type: number
        - name: updated_gte
          in: query
          type: string
          description: Return only results whose updated date is equal or greater to this value (ISO-8601 / YYYY-MM-DDTHH:MM:SSZ
            format)
        - name: sort
          in: query
          type: string
        - name: order
          in: query
          type: string
        - name: object
          in: query
          type: string
          description: Filter the results for webhooks for only this object
        - name: integration_type
          in: query
          type: string
          description: Filter the results to just this integration
        - name: connection_id
          in: query
          type: string
          description: Filter the results to just this integration
        - name: created_lte
          in: query
          type: string
          description: Return only results whose created date is equal or less to this value
        - name: env
          in: query
          type: string
      - name: createunifiedwebhook
        method: POST
        description: Create Webhook Subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: include_all
          in: query
          type: boolean
          description: When set, all of the existing data will sent back to your server.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: unified-webhook-id
      path: /unified/webhook/{id}
      operations:
      - name: removeunifiedwebhook
        method: DELETE
        description: Remove Webhook Subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: ID of the Webhook
          required: true
      - name: getunifiedwebhook
        method: GET
        description: Retrieve Webhook by Its Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: ID of the Webhook
          required: true
      - name: patchunifiedwebhook
        method: PATCH
        description: Update Webhook Subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: ID of the Webhook
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: updateunifiedwebhook
        method: PUT
        description: Update Webhook Subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: ID of the Webhook
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: unified-webhook-id-trigger
      path: /unified/webhook/{id}/trigger
      operations:
      - name: patchunifiedwebhooktrigger
        method: PATCH
        description: Trigger Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: ID of the Webhook
          required: true
      - name: updateunifiedwebhooktrigger
        method: PUT
        description: Trigger Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: ID of the Webhook
          required: true
    authentication:
      type: apikey
      key: authorization
      value: '{{env.UNIFIED_TO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: full-webhook-rest
    port: 8080
    description: REST adapter for Unified.to  API — webhook. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/unified/webhook
      name: unified-webhook
      description: REST surface for unified-webhook.
      operations:
