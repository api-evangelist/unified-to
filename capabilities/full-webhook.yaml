        idempotent: true
      call: full-webhook.patchunifiedwebhook
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-webhook-subscription-2
      description: Update Webhook Subscription
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: full-webhook.updateunifiedwebhook
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: trigger-webhook
