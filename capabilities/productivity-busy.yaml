naftiko: 1.0.0-alpha2
info:
  label: Unified.to  API — busy
  description: 'Unified.to  API — busy. 1 operations. Lead operation: List all busies. Self-contained Naftiko capability covering
    one Unified To business surface.'
  tags:
  - Unified To
  - busy
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNIFIED_TO_API_KEY: UNIFIED_TO_API_KEY
capability:
  consumes:
  - type: http
    namespace: productivity-busy
    baseUri: https://api.unified.to
    description: Unified.to  API — busy business capability. Self-contained, no shared references.
    resources:
    - name: calendar-connection_id-busy
      path: /calendar/{connection_id}/busy
      operations:
      - name: listcalendarbusies
        method: GET
        description: List all busies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: number
        - name: offset
          in: query
          type: number
        - name: updated_gte
          in: query
          type: string
          description: Return only results whose updated date is equal or greater to this value (ISO-8601 / YYYY-MM-DDTHH:MM:SSZ
            format)
        - name: sort
          in: query
          type: string
        - name: order
          in: query
          type: string
        - name: query
          in: query
          type: string
          description: Query string to search. eg. email address or name
        - name: calendar_id
          in: query
          type: string
          description: The calendar ID to filter by (reference to CalendarCalendar)
        - name: start_gte
          in: query
          type: string
          description: The start date to filter by (ISO-8601 / YYYY-MM-DDTHH:MM:SSZ format)
        - name: end_lt
          in: query
          type: string
          description: The end date to filter by (ISO-8601 / YYYY-MM-DDTHH:MM:SSZ format)
        - name: user_id
          in: query
          type: string
          description: The user/employee ID to filter by (reference to HrisEmployee)
        - name: fields
          in: query
          type: array
          description: Fields to return
        - name: raw
          in: query
          type: string
          description: 'Raw parameters to include in the 3rd-party request. Encoded as a URL component. eg. raw parameters:
            foo=bar&zoo=bar -> raw=foo%3Dbar%26zoo%3Dbar'
        - name: connection_id
          in: path
          type: string
          description: ID of the connection
          required: true
    authentication:
      type: apikey
      key: authorization
      value: '{{env.UNIFIED_TO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: productivity-busy-rest
    port: 8080
    description: REST adapter for Unified.to  API — busy. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/calendar/{connection-id}/busy
      name: calendar-connection-id-busy
      description: REST surface for calendar-connection_id-busy.
      operations:
      - method: GET
        name: listcalendarbusies
        description: List all busies
        call: productivity-busy.listcalendarbusies
        with:
          limit: rest.limit
          offset: rest.offset
          updated_gte: rest.updated_gte
          sort: rest.sort
          order: rest.order
          query: rest.query
          calendar_id: rest.calendar_id
          start_gte: rest.start_gte
          end_lt: rest.end_lt
          user_id: rest.user_id
          fields: rest.fields
          raw: rest.raw
          connection_id: rest.connection_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: productivity-busy-mcp
    port: 9090
    transport: http
    description: MCP adapter for Unified.to  API — busy. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-all-busies
      description: List all busies
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: productivity-busy.listcalendarbusies
      with:
        limit: tools.limit
        offset: tools.offset
        updated_gte: tools.updated_gte
        sort: tools.sort
        order: tools.order
        query: tools.query
        calendar_id: tools.calendar_id
        start_gte: tools.start_gte
        end_lt: tools.end_lt
        user_id: tools.user_id
        fields: tools.fields
        raw: tools.raw
        connection_id: tools.connection_id
      outputParameters:
      - type: object
        mapping: $.
