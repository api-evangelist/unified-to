naftiko: 1.0.0-alpha2
info:
  label: Unified.to  API — embedding
  description: 'Unified.to  API — embedding. 1 operations. Lead operation: Create an Embedding. Self-contained Naftiko capability
    covering one Unified To business surface.'
  tags:
  - Unified To
  - embedding
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNIFIED_TO_API_KEY: UNIFIED_TO_API_KEY
capability:
  consumes:
  - type: http
    namespace: full-embedding
    baseUri: https://api.unified.to
    description: Unified.to  API — embedding business capability. Self-contained, no shared references.
    resources:
    - name: genai-connection_id-embedding
      path: /genai/{connection_id}/embedding
      operations:
      - name: creategenaiembedding
        method: POST
        description: Create an Embedding
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: Fields to return
        - name: raw
          in: query
          type: string
          description: 'Raw parameters to include in the 3rd-party request. Encoded as a URL component. eg. raw parameters:
            foo=bar&zoo=bar -> raw=foo%3Dbar%26zoo%3Dbar'
        - name: connection_id
          in: path
          type: string
          description: ID of the connection
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: authorization
      value: '{{env.UNIFIED_TO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: full-embedding-rest
    port: 8080
    description: REST adapter for Unified.to  API — embedding. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/genai/{connection-id}/embedding
      name: genai-connection-id-embedding
      description: REST surface for genai-connection_id-embedding.
      operations:
      - method: POST
        name: creategenaiembedding
        description: Create an Embedding
        call: full-embedding.creategenaiembedding
        with:
          fields: rest.fields
          raw: rest.raw
          connection_id: rest.connection_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: full-embedding-mcp
    port: 9090
    transport: http
    description: MCP adapter for Unified.to  API — embedding. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: create-embedding
      description: Create an Embedding
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: full-embedding.creategenaiembedding
      with:
        fields: tools.fields
        raw: tools.raw
        connection_id: tools.connection_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
