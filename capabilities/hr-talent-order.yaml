naftiko: 1.0.0-alpha2
info:
  label: Unified.to  API — order
  description: 'Unified.to  API — order. 2 operations. Lead operation: Update an order. Self-contained Naftiko capability
    covering one Unified To business surface.'
  tags:
  - Unified To
  - order
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNIFIED_TO_API_KEY: UNIFIED_TO_API_KEY
capability:
  consumes:
  - type: http
    namespace: hr-talent-order
    baseUri: https://api.unified.to
    description: Unified.to  API — order business capability. Self-contained, no shared references.
    resources:
    - name: assessment-connection_id-order-id
      path: /assessment/{connection_id}/order/{id}
      operations:
      - name: patchassessmentorder
        method: PATCH
        description: Update an order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: Fields to return
        - name: raw
          in: query
          type: string
          description: 'Raw parameters to include in the 3rd-party request. Encoded as a URL component. eg. raw parameters:
            foo=bar&zoo=bar -> raw=foo%3Dbar%26zoo%3Dbar'
        - name: connection_id
          in: path
          type: string
          description: ID of the connection
          required: true
        - name: id
          in: path
          type: string
          description: ID of the Order
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: updateassessmentorder
        method: PUT
        description: Update an order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: Fields to return
        - name: raw
          in: query
          type: string
          description: 'Raw parameters to include in the 3rd-party request. Encoded as a URL component. eg. raw parameters:
            foo=bar&zoo=bar -> raw=foo%3Dbar%26zoo%3Dbar'
        - name: connection_id
          in: path
          type: string
          description: ID of the connection
          required: true
        - name: id
          in: path
          type: string
          description: ID of the Order
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: authorization
      value: '{{env.UNIFIED_TO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: hr-talent-order-rest
    port: 8080
    description: REST adapter for Unified.to  API — order. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/assessment/{connection-id}/order/{id}
      name: assessment-connection-id-order-id
      description: REST surface for assessment-connection_id-order-id.
      operations:
      - method: PATCH
        name: patchassessmentorder
        description: Update an order
        call: hr-talent-order.patchassessmentorder
        with:
          fields: rest.fields
          raw: rest.raw
          connection_id: rest.connection_id
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateassessmentorder
        description: Update an order
        call: hr-talent-order.updateassessmentorder
        with:
          fields: rest.fields
          raw: rest.raw
          connection_id: rest.connection_id
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: hr-talent-order-mcp
    port: 9090
    transport: http
    description: MCP adapter for Unified.to  API — order. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: update-order
      description: Update an order
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: hr-talent-order.patchassessmentorder
      with:
        fields: tools.fields
        raw: tools.raw
        connection_id: tools.connection_id
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-order-2
      description: Update an order
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: hr-talent-order.updateassessmentorder
      with:
        fields: tools.fields
        raw: tools.raw
        connection_id: tools.connection_id
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
