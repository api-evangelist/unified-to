naftiko: "1.0.0-alpha1"

info:
  label: "Unified.to Sales and CRM"
  description: >-
    Unified sales and CRM workflow combining contacts, companies, deals, and activities
    across 47+ CRM integrations including Salesforce, HubSpot, Pipedrive, and Zoho.
    Used by revenue operations teams, sales developers, and CRM integrators building
    cross-platform sales tooling.
  tags:
    - Unified.to
    - CRM
    - Sales
    - Contacts
    - Deals
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      UNIFIED_TO_API_KEY: UNIFIED_TO_API_KEY

capability:
  consumes:
    - import: unified-crm
      location: ./shared/crm-api.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: unified-sales-crm-api
      description: "Unified REST API for sales and CRM data across 47+ integrations."
      resources:
        - path: /v1/crm/{connection_id}/contacts
          name: contacts
          description: "CRM contact management across all integrations"
          operations:
            - method: GET
              name: list-crm-contacts
              description: "List contacts from a CRM integration"
              call: "unified-crm.list-crm-contacts"
              with:
                connection_id: "rest.connection_id"
                query: "rest.query"
                limit: "rest.limit"
                offset: "rest.offset"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-crm-contact
              description: "Create a new contact in a CRM integration"
              call: "unified-crm.create-crm-contact"
              with:
                connection_id: "rest.connection_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/crm/{connection_id}/companies
          name: companies
          description: "CRM company management across all integrations"
          operations:
            - method: GET
              name: list-crm-companies
              description: "List companies from a CRM integration"
              call: "unified-crm.list-crm-companies"
              with:
                connection_id: "rest.connection_id"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/crm/{connection_id}/deals
          name: deals
          description: "CRM deal and opportunity management"
          operations:
            - method: GET
              name: list-crm-deals
              description: "List deals from a CRM integration"
              call: "unified-crm.list-crm-deals"
              with:
                connection_id: "rest.connection_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-crm-deal
              description: "Create a new deal in a CRM integration"
              call: "unified-crm.create-crm-deal"
              with:
                connection_id: "rest.connection_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9080
      namespace: unified-sales-crm-mcp
      transport: http
      description: "MCP server for AI-assisted sales and CRM operations across 47+ integrations."
      tools:
        - name: list-crm-contacts
          description: "List contacts from a connected CRM integration (Salesforce, HubSpot, Pipedrive, etc.)"
          hints:
            readOnly: true
            openWorld: false
          call: "unified-crm.list-crm-contacts"
          with:
            connection_id: "tools.connection_id"
            query: "tools.query"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-crm-contact
          description: "Create a new contact in a connected CRM integration"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "unified-crm.create-crm-contact"
          with:
            connection_id: "tools.connection_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-crm-companies
          description: "List companies from a connected CRM integration"
          hints:
            readOnly: true
            openWorld: false
          call: "unified-crm.list-crm-companies"
          with:
            connection_id: "tools.connection_id"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-crm-deals
          description: "List deals and opportunities from a connected CRM integration"
          hints:
            readOnly: true
            openWorld: false
          call: "unified-crm.list-crm-deals"
          with:
            connection_id: "tools.connection_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-crm-deal
          description: "Create a new deal or opportunity in a connected CRM integration"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "unified-crm.create-crm-deal"
          with:
            connection_id: "tools.connection_id"
          outputParameters:
            - type: object
              mapping: "$."
