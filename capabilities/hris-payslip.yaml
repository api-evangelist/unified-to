naftiko: 1.0.0-alpha2
info:
  label: Unified.to  API — payslip
  description: 'Unified.to  API — payslip. 2 operations. Lead operation: List all payslips. Self-contained Naftiko capability
    covering one Unified To business surface.'
  tags:
  - Unified To
  - payslip
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNIFIED_TO_API_KEY: UNIFIED_TO_API_KEY
capability:
  consumes:
  - type: http
    namespace: hris-payslip
    baseUri: https://api.unified.to
    description: Unified.to  API — payslip business capability. Self-contained, no shared references.
    resources:
    - name: hris-connection_id-payslip
      path: /hris/{connection_id}/payslip
      operations:
      - name: listhrispayslips
        method: GET
        description: List all payslips
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: number
        - name: offset
          in: query
          type: number
        - name: updated_gte
          in: query
          type: string
          description: Return only results whose updated date is equal or greater to this value (ISO-8601 / YYYY-MM-DDTHH:MM:SSZ
            format)
        - name: sort
          in: query
          type: string
        - name: order
          in: query
          type: string
        - name: query
          in: query
          type: string
          description: Query string to search. eg. email address or name
        - name: user_id
          in: query
          type: string
          description: The user/employee ID to filter by (reference to HrisEmployee)
        - name: company_id
          in: query
          type: string
          description: The company ID to filter by (reference to HrisCompany)
        - name: fields
          in: query
          type: array
          description: Fields to return
        - name: raw
          in: query
          type: string
          description: 'Raw parameters to include in the 3rd-party request. Encoded as a URL component. eg. raw parameters:
            foo=bar&zoo=bar -> raw=foo%3Dbar%26zoo%3Dbar'
        - name: connection_id
          in: path
          type: string
          description: ID of the connection
          required: true
    - name: hris-connection_id-payslip-id
      path: /hris/{connection_id}/payslip/{id}
      operations:
      - name: gethrispayslip
        method: GET
        description: Retrieve a payslip
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: Fields to return
        - name: raw
          in: query
          type: string
          description: 'Raw parameters to include in the 3rd-party request. Encoded as a URL component. eg. raw parameters:
            foo=bar&zoo=bar -> raw=foo%3Dbar%26zoo%3Dbar'
        - name: connection_id
          in: path
          type: string
          description: ID of the connection
          required: true
        - name: id
          in: path
          type: string
          description: ID of the Payslip
          required: true
    authentication:
      type: apikey
      key: authorization
      value: '{{env.UNIFIED_TO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: hris-payslip-rest
    port: 8080
    description: REST adapter for Unified.to  API — payslip. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/hris/{connection-id}/payslip
      name: hris-connection-id-payslip
      description: REST surface for hris-connection_id-payslip.
      operations:
      - method: GET
        name: listhrispayslips
        description: List all payslips
        call: hris-payslip.listhrispayslips
        with:
          limit: rest.limit
          offset: rest.offset
          updated_gte: rest.updated_gte
          sort: rest.sort
          order: rest.order
          query: rest.query
          user_id: rest.user_id
          company_id: rest.company_id
          fields: rest.fields
          raw: rest.raw
          connection_id: rest.connection_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/hris/{connection-id}/payslip/{id}
      name: hris-connection-id-payslip-id
      description: REST surface for hris-connection_id-payslip-id.
      operations:
      - method: GET
        name: gethrispayslip
        description: Retrieve a payslip
        call: hris-payslip.gethrispayslip
        with:
          fields: rest.fields
          raw: rest.raw
          connection_id: rest.connection_id
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: hris-payslip-mcp
    port: 9090
    transport: http
    description: MCP adapter for Unified.to  API — payslip. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-all-payslips
      description: List all payslips
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hris-payslip.listhrispayslips
      with:
        limit: tools.limit
        offset: tools.offset
        updated_gte: tools.updated_gte
        sort: tools.sort
        order: tools.order
        query: tools.query
        user_id: tools.user_id
        company_id: tools.company_id
        fields: tools.fields
        raw: tools.raw
        connection_id: tools.connection_id
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-payslip
      description: Retrieve a payslip
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hris-payslip.gethrispayslip
      with:
        fields: tools.fields
        raw: tools.raw
        connection_id: tools.connection_id
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
