naftiko: 1.0.0-alpha2
info:
  label: Unified.to  API — recording
  description: 'Unified.to  API — recording. 2 operations. Lead operation: List all recordings. Self-contained Naftiko capability
    covering one Unified To business surface.'
  tags:
  - Unified To
  - recording
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNIFIED_TO_API_KEY: UNIFIED_TO_API_KEY
capability:
  consumes:
  - type: http
    namespace: productivity-recording
    baseUri: https://api.unified.to
    description: Unified.to  API — recording business capability. Self-contained, no shared references.
    resources:
    - name: calendar-connection_id-recording
      path: /calendar/{connection_id}/recording
      operations:
      - name: listcalendarrecordings
        method: GET
        description: List all recordings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: number
        - name: offset
          in: query
          type: number
        - name: updated_gte
          in: query
          type: string
          description: Return only results whose updated date is equal or greater to this value (ISO-8601 / YYYY-MM-DDTHH:MM:SSZ
            format)
        - name: sort
          in: query
          type: string
        - name: order
          in: query
          type: string
        - name: query
          in: query
          type: string
          description: Query string to search. eg. email address or name
        - name: event_id
          in: query
          type: string
          description: The event ID to filter by (reference to CalendarEvent)
        - name: start_gte
          in: query
          type: string
          description: The start date to filter by (ISO-8601 / YYYY-MM-DDTHH:MM:SSZ format)
        - name: end_lt
          in: query
          type: string
          description: The end date to filter by (ISO-8601 / YYYY-MM-DDTHH:MM:SSZ format)
        - name: fields
          in: query
          type: array
          description: Fields to return
        - name: raw
          in: query
          type: string
          description: 'Raw parameters to include in the 3rd-party request. Encoded as a URL component. eg. raw parameters:
            foo=bar&zoo=bar -> raw=foo%3Dbar%26zoo%3Dbar'
        - name: connection_id
          in: path
          type: string
          description: ID of the connection
          required: true
    - name: calendar-connection_id-recording-id
      path: /calendar/{connection_id}/recording/{id}
      operations:
      - name: getcalendarrecording
        method: GET
        description: Retrieve a recording
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: Fields to return
        - name: raw
          in: query
          type: string
          description: 'Raw parameters to include in the 3rd-party request. Encoded as a URL component. eg. raw parameters:
            foo=bar&zoo=bar -> raw=foo%3Dbar%26zoo%3Dbar'
        - name: connection_id
          in: path
          type: string
          description: ID of the connection
          required: true
        - name: id
          in: path
          type: string
          description: ID of the Recording
          required: true
    authentication:
      type: apikey
      key: authorization
      value: '{{env.UNIFIED_TO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: productivity-recording-rest
    port: 8080
    description: REST adapter for Unified.to  API — recording. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/calendar/{connection-id}/recording
      name: calendar-connection-id-recording
      description: REST surface for calendar-connection_id-recording.
      operations:
      - method: GET
        name: listcalendarrecordings
        description: List all recordings
        call: productivity-recording.listcalendarrecordings
        with:
          limit: rest.limit
          offset: rest.offset
          updated_gte: rest.updated_gte
          sort: rest.sort
          order: rest.order
          query: rest.query
          event_id: rest.event_id
          start_gte: rest.start_gte
          end_lt: rest.end_lt
          fields: rest.fields
          raw: rest.raw
          connection_id: rest.connection_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/calendar/{connection-id}/recording/{id}
      name: calendar-connection-id-recording-id
      description: REST surface for calendar-connection_id-recording-id.
      operations:
      - method: GET
        name: getcalendarrecording
        description: Retrieve a recording
        call: productivity-recording.getcalendarrecording
        with:
          fields: rest.fields
          raw: rest.raw
          connection_id: rest.connection_id
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: productivity-recording-mcp
    port: 9090
    transport: http
    description: MCP adapter for Unified.to  API — recording. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-all-recordings
      description: List all recordings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: productivity-recording.listcalendarrecordings
      with:
        limit: tools.limit
        offset: tools.offset
        updated_gte: tools.updated_gte
        sort: tools.sort
        order: tools.order
        query: tools.query
        event_id: tools.event_id
        start_gte: tools.start_gte
        end_lt: tools.end_lt
        fields: tools.fields
        raw: tools.raw
        connection_id: tools.connection_id
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-recording
      description: Retrieve a recording
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: productivity-recording.getcalendarrecording
      with:
        fields: tools.fields
        raw: tools.raw
        connection_id: tools.connection_id
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
