naftiko: 1.0.0-alpha2
info:
  label: Unified.to  API — organization
  description: 'Unified.to  API — organization. 2 operations. Lead operation: List all organizations. Self-contained Naftiko
    capability covering one Unified To business surface.'
  tags:
  - Unified To
  - organization
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNIFIED_TO_API_KEY: UNIFIED_TO_API_KEY
capability:
  consumes:
  - type: http
    namespace: accounting-organization
    baseUri: https://api.unified.to
    description: Unified.to  API — organization business capability. Self-contained, no shared references.
    resources:
    - name: accounting-connection_id-organization
      path: /accounting/{connection_id}/organization
      operations:
      - name: listaccountingorganizations
        method: GET
        description: List all organizations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: number
        - name: offset
          in: query
          type: number
        - name: updated_gte
          in: query
          type: string
          description: Return only results whose updated date is equal or greater to this value (ISO-8601 / YYYY-MM-DDTHH:MM:SSZ
            format)
        - name: sort
          in: query
          type: string
        - name: order
          in: query
          type: string
        - name: query
          in: query
          type: string
          description: Query string to search. eg. email address or name
        - name: fields
          in: query
          type: array
          description: Fields to return
        - name: raw
          in: query
          type: string
          description: 'Raw parameters to include in the 3rd-party request. Encoded as a URL component. eg. raw parameters:
            foo=bar&zoo=bar -> raw=foo%3Dbar%26zoo%3Dbar'
        - name: connection_id
          in: path
          type: string
          description: ID of the connection
          required: true
    - name: accounting-connection_id-organization-id
      path: /accounting/{connection_id}/organization/{id}
      operations:
      - name: getaccountingorganization
        method: GET
        description: Retrieve an organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: Fields to return
        - name: raw
          in: query
          type: string
          description: 'Raw parameters to include in the 3rd-party request. Encoded as a URL component. eg. raw parameters:
            foo=bar&zoo=bar -> raw=foo%3Dbar%26zoo%3Dbar'
        - name: connection_id
          in: path
          type: string
          description: ID of the connection
          required: true
        - name: id
          in: path
          type: string
          description: ID of the Organization
          required: true
    authentication:
      type: apikey
      key: authorization
      value: '{{env.UNIFIED_TO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: accounting-organization-rest
    port: 8080
    description: REST adapter for Unified.to  API — organization. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/accounting/{connection-id}/organization
      name: accounting-connection-id-organization
      description: REST surface for accounting-connection_id-organization.
      operations:
      - method: GET
        name: listaccountingorganizations
        description: List all organizations
        call: accounting-organization.listaccountingorganizations
        with:
          limit: rest.limit
          offset: rest.offset
          updated_gte: rest.updated_gte
          sort: rest.sort
          order: rest.order
          query: rest.query
          fields: rest.fields
          raw: rest.raw
          connection_id: rest.connection_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounting/{connection-id}/organization/{id}
      name: accounting-connection-id-organization-id
      description: REST surface for accounting-connection_id-organization-id.
      operations:
      - method: GET
        name: getaccountingorganization
        description: Retrieve an organization
        call: accounting-organization.getaccountingorganization
        with:
          fields: rest.fields
          raw: rest.raw
          connection_id: rest.connection_id
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: accounting-organization-mcp
    port: 9090
    transport: http
    description: MCP adapter for Unified.to  API — organization. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-all-organizations
      description: List all organizations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounting-organization.listaccountingorganizations
      with:
        limit: tools.limit
        offset: tools.offset
        updated_gte: tools.updated_gte
        sort: tools.sort
        order: tools.order
        query: tools.query
        fields: tools.fields
        raw: tools.raw
        connection_id: tools.connection_id
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-organization
      description: Retrieve an organization
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounting-organization.getaccountingorganization
      with:
        fields: tools.fields
        raw: tools.raw
        connection_id: tools.connection_id
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
