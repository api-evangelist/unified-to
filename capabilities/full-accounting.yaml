        type: tools.type
        fields: tools.fields
        raw: tools.raw
        connection_id: tools.connection_id
      outputParameters:
      - type: object
        mapping: $.
    - name: create-account
      description: Create an Account
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: full-accounting.createaccountingaccount
      with:
        fields: tools.fields
        raw: tools.raw
        connection_id: tools.connection_id
        body: tools.body
      outputParameters:
      - type: object
