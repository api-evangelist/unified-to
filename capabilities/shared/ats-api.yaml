naftiko: "1.0.0-alpha1"

info:
  label: "Unified.to ATS API"
  description: "Real-time unified applicant tracking API providing access to jobs, candidates, applications, interviews, and hiring decisions across 73 integrations including Greenhouse, Lever, and Workable."
  tags:
    - Unified.to
    - ATS
    - Applicant Tracking
    - Recruiting
    - Hiring
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      UNIFIED_TO_API_KEY: UNIFIED_TO_API_KEY

capability:
  consumes:
    - type: http
      namespace: unified-ats
      baseUri: https://api.unified.to
      description: "Unified ATS API for recruiting and talent acquisition."
      authentication:
        type: bearer
        token: "{{UNIFIED_TO_API_KEY}}"
      resources:
        - name: jobs
          path: /ats/{connection_id}/job
          description: "Job posting management"
          operations:
            - name: list-ats-jobs
              method: GET
              description: "List job postings"
              inputParameters:
                - name: connection_id
                  in: path
                  type: string
                  required: true
                  description: "ATS integration connection ID"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: candidates
          path: /ats/{connection_id}/candidate
          description: "Candidate profile management"
          operations:
            - name: list-ats-candidates
              method: GET
              description: "List candidates"
              inputParameters:
                - name: connection_id
                  in: path
                  type: string
                  required: true
                  description: "ATS integration connection ID"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: query
                  in: query
                  type: string
                  required: false
                  description: "Search query"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-ats-candidate
              method: POST
              description: "Create a new candidate"
              inputParameters:
                - name: connection_id
                  in: path
                  type: string
                  required: true
                  description: "ATS integration connection ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: applications
          path: /ats/{connection_id}/application
          description: "Job application management"
          operations:
            - name: list-ats-applications
              method: GET
              description: "List job applications"
              inputParameters:
                - name: connection_id
                  in: path
                  type: string
                  required: true
                  description: "ATS integration connection ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: interviews
          path: /ats/{connection_id}/interview
          description: "Interview management"
          operations:
            - name: list-ats-interviews
              method: GET
              description: "List interviews"
              inputParameters:
                - name: connection_id
                  in: path
                  type: string
                  required: true
                  description: "ATS integration connection ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: unified-ats-api
      resources:
        - path: /v1/ats/{connection_id}/jobs
          name: jobs
          operations:
            - method: GET
              name: list-ats-jobs
              description: "List job postings"
        - path: /v1/ats/{connection_id}/candidates
          name: candidates
          operations:
            - method: GET
              name: list-ats-candidates
              description: "List candidates"
            - method: POST
              name: create-ats-candidate
              description: "Create candidate"

    - type: mcp
      port: 9102
      namespace: unified-ats-mcp
      transport: http
      tools:
        - name: list-ats-jobs
          description: "List job postings from an ATS integration"
          hints:
            readOnly: true
            openWorld: false
          call: "unified-ats.list-ats-jobs"
          with:
            connection_id: "tools.connection_id"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-ats-candidates
          description: "List candidates from an ATS integration"
          hints:
            readOnly: true
            openWorld: false
          call: "unified-ats.list-ats-candidates"
          with:
            connection_id: "tools.connection_id"
            query: "tools.query"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-ats-applications
          description: "List job applications from an ATS integration"
          hints:
            readOnly: true
            openWorld: false
          call: "unified-ats.list-ats-applications"
          with:
            connection_id: "tools.connection_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-ats-interviews
          description: "List scheduled interviews from an ATS integration"
          hints:
            readOnly: true
            openWorld: false
          call: "unified-ats.list-ats-interviews"
          with:
            connection_id: "tools.connection_id"
          outputParameters:
            - type: object
              mapping: "$."
