naftiko: "1.0.0-alpha1"

info:
  label: "Unified.to HRIS API"
  description: "Real-time unified HR and directory API providing access to employees, groups, payslips, and benefits across 223 integrations including Workday, BambooHR, and ADP."
  tags:
    - Unified.to
    - HRIS
    - HR
    - Employees
    - Payroll
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      UNIFIED_TO_API_KEY: UNIFIED_TO_API_KEY

capability:
  consumes:
    - type: http
      namespace: unified-hris
      baseUri: https://api.unified.to
      description: "Unified HRIS API for employee, group, and payroll data."
      authentication:
        type: bearer
        token: "{{UNIFIED_TO_API_KEY}}"
      resources:
        - name: employees
          path: /hris/{connection_id}/employee
          description: "Employee data management"
          operations:
            - name: list-hris-employees
              method: GET
              description: "List HRIS employees"
              inputParameters:
                - name: connection_id
                  in: path
                  type: string
                  required: true
                  description: "HRIS integration connection ID"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
                - name: query
                  in: query
                  type: string
                  required: false
                  description: "Search query"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-hris-employee
              method: POST
              description: "Create a new employee record"
              inputParameters:
                - name: connection_id
                  in: path
                  type: string
                  required: true
                  description: "HRIS integration connection ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-hris-employee
              method: GET
              description: "Get a specific employee by ID"
              inputParameters:
                - name: connection_id
                  in: path
                  type: string
                  required: true
                  description: "HRIS integration connection ID"
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Employee ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-hris-employee
              method: PUT
              description: "Update an existing employee record"
              inputParameters:
                - name: connection_id
                  in: path
                  type: string
                  required: true
                  description: "HRIS integration connection ID"
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Employee ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: groups
          path: /hris/{connection_id}/group
          description: "HR group and department management"
          operations:
            - name: list-hris-groups
              method: GET
              description: "List HR groups and departments"
              inputParameters:
                - name: connection_id
                  in: path
                  type: string
                  required: true
                  description: "HRIS integration connection ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: payslips
          path: /hris/{connection_id}/payslip
          description: "Payslip data access"
          operations:
            - name: list-hris-payslips
              method: GET
              description: "List payslips for employees"
              inputParameters:
                - name: connection_id
                  in: path
                  type: string
                  required: true
                  description: "HRIS integration connection ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: unified-hris-api
      resources:
        - path: /v1/hris/{connection_id}/employees
          name: employees
          operations:
            - method: GET
              name: list-hris-employees
              description: "List employees"
            - method: POST
              name: create-hris-employee
              description: "Create employee"
        - path: /v1/hris/{connection_id}/groups
          name: groups
          operations:
            - method: GET
              name: list-hris-groups
              description: "List HR groups"

    - type: mcp
      port: 9101
      namespace: unified-hris-mcp
      transport: http
      tools:
        - name: list-hris-employees
          description: "List employees from an HRIS integration"
          hints:
            readOnly: true
            openWorld: false
          call: "unified-hris.list-hris-employees"
          with:
            connection_id: "tools.connection_id"
            query: "tools.query"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-hris-employee
          description: "Create a new employee in an HRIS integration"
          hints:
            readOnly: false
            destructive: false
          call: "unified-hris.create-hris-employee"
          with:
            connection_id: "tools.connection_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-hris-groups
          description: "List HR groups and departments"
          hints:
            readOnly: true
            openWorld: false
          call: "unified-hris.list-hris-groups"
          with:
            connection_id: "tools.connection_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-hris-payslips
          description: "List employee payslips"
          hints:
            readOnly: true
            openWorld: false
          call: "unified-hris.list-hris-payslips"
          with:
            connection_id: "tools.connection_id"
          outputParameters:
            - type: object
              mapping: "$."
