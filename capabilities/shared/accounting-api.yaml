naftiko: "1.0.0-alpha1"

info:
  label: "Unified.to Accounting API"
  description: "Real-time unified accounting API providing access to accounts, invoices, bills, transactions, contacts, and payments across 41 integrations including QuickBooks, Xero, and FreshBooks."
  tags:
    - Unified.to
    - Accounting
    - Financial
    - Invoices
    - Payments
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      UNIFIED_TO_API_KEY: UNIFIED_TO_API_KEY

capability:
  consumes:
    - type: http
      namespace: unified-accounting
      baseUri: https://api.unified.to
      description: "Unified Accounting API for financial data management."
      authentication:
        type: bearer
        token: "{{UNIFIED_TO_API_KEY}}"
      resources:
        - name: accounts
          path: /accounting/{connection_id}/account
          description: "Chart of accounts management"
          operations:
            - name: list-accounting-accounts
              method: GET
              description: "List accounts from the chart of accounts"
              inputParameters:
                - name: connection_id
                  in: path
                  type: string
                  required: true
                  description: "Accounting integration connection ID"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: invoices
          path: /accounting/{connection_id}/invoice
          description: "Invoice management"
          operations:
            - name: list-accounting-invoices
              method: GET
              description: "List invoices"
              inputParameters:
                - name: connection_id
                  in: path
                  type: string
                  required: true
                  description: "Accounting integration connection ID"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-accounting-invoice
              method: POST
              description: "Create an invoice"
              inputParameters:
                - name: connection_id
                  in: path
                  type: string
                  required: true
                  description: "Accounting integration connection ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: transactions
          path: /accounting/{connection_id}/transaction
          description: "Financial transaction management"
          operations:
            - name: list-accounting-transactions
              method: GET
              description: "List financial transactions"
              inputParameters:
                - name: connection_id
                  in: path
                  type: string
                  required: true
                  description: "Accounting integration connection ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: contacts
          path: /accounting/{connection_id}/contact
          description: "Accounting contact (customer/vendor) management"
          operations:
            - name: list-accounting-contacts
              method: GET
              description: "List accounting contacts"
              inputParameters:
                - name: connection_id
                  in: path
                  type: string
                  required: true
                  description: "Accounting integration connection ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: payments
          path: /accounting/{connection_id}/payment
          description: "Payment management"
          operations:
            - name: list-accounting-payments
              method: GET
              description: "List accounting payments"
              inputParameters:
                - name: connection_id
                  in: path
                  type: string
                  required: true
                  description: "Accounting integration connection ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8103
      namespace: unified-accounting-api
      resources:
        - path: /v1/accounting/{connection_id}/accounts
          name: accounts
          operations:
            - method: GET
              name: list-accounting-accounts
              description: "List accounts"
        - path: /v1/accounting/{connection_id}/invoices
          name: invoices
          operations:
            - method: GET
              name: list-accounting-invoices
              description: "List invoices"
            - method: POST
              name: create-accounting-invoice
              description: "Create invoice"

    - type: mcp
      port: 9103
      namespace: unified-accounting-mcp
      transport: http
      tools:
        - name: list-accounting-accounts
          description: "List chart of accounts from an accounting integration"
          hints:
            readOnly: true
            openWorld: false
          call: "unified-accounting.list-accounting-accounts"
          with:
            connection_id: "tools.connection_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-accounting-invoices
          description: "List invoices from an accounting integration"
          hints:
            readOnly: true
            openWorld: false
          call: "unified-accounting.list-accounting-invoices"
          with:
            connection_id: "tools.connection_id"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-accounting-invoice
          description: "Create an invoice in an accounting integration"
          hints:
            readOnly: false
            destructive: false
          call: "unified-accounting.create-accounting-invoice"
          with:
            connection_id: "tools.connection_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-accounting-transactions
          description: "List financial transactions from an accounting integration"
          hints:
            readOnly: true
            openWorld: false
          call: "unified-accounting.list-accounting-transactions"
          with:
            connection_id: "tools.connection_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-accounting-payments
          description: "List payments from an accounting integration"
          hints:
            readOnly: true
            openWorld: false
          call: "unified-accounting.list-accounting-payments"
          with:
            connection_id: "tools.connection_id"
          outputParameters:
            - type: object
              mapping: "$."
