naftiko: "1.0.0-alpha1"

info:
  label: "Unified.to CRM API"
  description: "Real-time unified CRM API providing access to contacts, companies, deals, pipelines, leads, and activities across 47 integrations including Salesforce, HubSpot, and Pipedrive."
  tags:
    - Unified.to
    - CRM
    - Contacts
    - Deals
    - Sales
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      UNIFIED_TO_API_KEY: UNIFIED_TO_API_KEY

capability:
  consumes:
    - type: http
      namespace: unified-crm
      baseUri: https://api.unified.to
      description: "Unified CRM API for contacts, companies, deals, and events."
      authentication:
        type: bearer
        token: "{{UNIFIED_TO_API_KEY}}"
      resources:
        - name: contacts
          path: /crm/{connection_id}/contact
          description: "CRM contact management"
          operations:
            - name: list-crm-contacts
              method: GET
              description: "List CRM contacts"
              inputParameters:
                - name: connection_id
                  in: path
                  type: string
                  required: true
                  description: "CRM integration connection ID"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
                - name: query
                  in: query
                  type: string
                  required: false
                  description: "Search query"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-crm-contact
              method: POST
              description: "Create a CRM contact"
              inputParameters:
                - name: connection_id
                  in: path
                  type: string
                  required: true
                  description: "CRM integration connection ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: companies
          path: /crm/{connection_id}/company
          description: "CRM company management"
          operations:
            - name: list-crm-companies
              method: GET
              description: "List CRM companies"
              inputParameters:
                - name: connection_id
                  in: path
                  type: string
                  required: true
                  description: "CRM integration connection ID"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-crm-company
              method: POST
              description: "Create a CRM company"
              inputParameters:
                - name: connection_id
                  in: path
                  type: string
                  required: true
                  description: "CRM integration connection ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: deals
          path: /crm/{connection_id}/deal
          description: "CRM deal management"
          operations:
            - name: list-crm-deals
              method: GET
              description: "List CRM deals"
              inputParameters:
                - name: connection_id
                  in: path
                  type: string
                  required: true
                  description: "CRM integration connection ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-crm-deal
              method: POST
              description: "Create a CRM deal"
              inputParameters:
                - name: connection_id
                  in: path
                  type: string
                  required: true
                  description: "CRM integration connection ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: unified-crm-api
      resources:
        - path: /v1/crm/{connection_id}/contacts
          name: contacts
          operations:
            - method: GET
              name: list-crm-contacts
              description: "List CRM contacts"
            - method: POST
              name: create-crm-contact
              description: "Create CRM contact"
        - path: /v1/crm/{connection_id}/companies
          name: companies
          operations:
            - method: GET
              name: list-crm-companies
              description: "List CRM companies"
        - path: /v1/crm/{connection_id}/deals
          name: deals
          operations:
            - method: GET
              name: list-crm-deals
              description: "List CRM deals"

    - type: mcp
      port: 9100
      namespace: unified-crm-mcp
      transport: http
      tools:
        - name: list-crm-contacts
          description: "List contacts from a CRM integration"
          hints:
            readOnly: true
            openWorld: false
          call: "unified-crm.list-crm-contacts"
          with:
            connection_id: "tools.connection_id"
            query: "tools.query"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-crm-contact
          description: "Create a new contact in a CRM integration"
          hints:
            readOnly: false
            destructive: false
          call: "unified-crm.create-crm-contact"
          with:
            connection_id: "tools.connection_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-crm-companies
          description: "List companies from a CRM integration"
          hints:
            readOnly: true
            openWorld: false
          call: "unified-crm.list-crm-companies"
          with:
            connection_id: "tools.connection_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-crm-deals
          description: "List deals from a CRM integration"
          hints:
            readOnly: true
            openWorld: false
          call: "unified-crm.list-crm-deals"
          with:
            connection_id: "tools.connection_id"
          outputParameters:
            - type: object
              mapping: "$."
