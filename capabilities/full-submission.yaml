naftiko: 1.0.0-alpha2
info:
  label: Unified.to  API — submission
  description: 'Unified.to  API — submission. 2 operations. Lead operation: List All Submissions. Self-contained Naftiko capability
    covering one Unified To business surface.'
  tags:
  - Unified To
  - submission
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNIFIED_TO_API_KEY: UNIFIED_TO_API_KEY
capability:
  consumes:
  - type: http
    namespace: full-submission
    baseUri: https://api.unified.to
    description: Unified.to  API — submission business capability. Self-contained, no shared references.
    resources:
    - name: forms-connection_id-submission
      path: /forms/{connection_id}/submission
      operations:
      - name: listformssubmissions
        method: GET
        description: List All Submissions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: number
        - name: offset
          in: query
          type: number
        - name: updated_gte
          in: query
          type: string
          description: Return only results whose updated date is equal or greater to this value (ISO-8601 / YYYY-MM-DDTHH:MM:SSZ
            format)
        - name: sort
          in: query
          type: string
        - name: order
          in: query
          type: string
        - name: query
          in: query
          type: string
          description: Query string to search. eg. email address or name
        - name: form_id
          in: query
          type: string
          description: The form ID to filter by
        - name: fields
          in: query
          type: array
          description: Fields to return
        - name: raw
          in: query
          type: string
          description: 'Raw parameters to include in the 3rd-party request. Encoded as a URL component. eg. raw parameters:
            foo=bar&zoo=bar -> raw=foo%3Dbar%26zoo%3Dbar'
        - name: connection_id
          in: path
          type: string
          description: ID of the connection
          required: true
    - name: forms-connection_id-submission-id
      path: /forms/{connection_id}/submission/{id}
      operations:
      - name: getformssubmission
        method: GET
        description: Retrieve a Submission
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: Fields to return
        - name: raw
          in: query
          type: string
          description: 'Raw parameters to include in the 3rd-party request. Encoded as a URL component. eg. raw parameters:
            foo=bar&zoo=bar -> raw=foo%3Dbar%26zoo%3Dbar'
        - name: connection_id
          in: path
          type: string
          description: ID of the connection
          required: true
        - name: id
          in: path
          type: string
          description: ID of the Submission
          required: true
    authentication:
      type: apikey
      key: authorization
      value: '{{env.UNIFIED_TO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: full-submission-rest
    port: 8080
    description: REST adapter for Unified.to  API — submission. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/forms/{connection-id}/submission
      name: forms-connection-id-submission
      description: REST surface for forms-connection_id-submission.
      operations:
      - method: GET
        name: listformssubmissions
        description: List All Submissions
        call: full-submission.listformssubmissions
        with:
          limit: rest.limit
          offset: rest.offset
          updated_gte: rest.updated_gte
          sort: rest.sort
          order: rest.order
          query: rest.query
          form_id: rest.form_id
          fields: rest.fields
          raw: rest.raw
          connection_id: rest.connection_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/forms/{connection-id}/submission/{id}
      name: forms-connection-id-submission-id
      description: REST surface for forms-connection_id-submission-id.
      operations:
      - method: GET
        name: getformssubmission
        description: Retrieve a Submission
        call: full-submission.getformssubmission
        with:
          fields: rest.fields
          raw: rest.raw
          connection_id: rest.connection_id
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: full-submission-mcp
    port: 9090
    transport: http
    description: MCP adapter for Unified.to  API — submission. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-all-submissions
      description: List All Submissions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: full-submission.listformssubmissions
      with:
        limit: tools.limit
        offset: tools.offset
        updated_gte: tools.updated_gte
        sort: tools.sort
        order: tools.order
        query: tools.query
        form_id: tools.form_id
        fields: tools.fields
        raw: tools.raw
        connection_id: tools.connection_id
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-submission
      description: Retrieve a Submission
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: full-submission.getformssubmission
      with:
        fields: tools.fields
        raw: tools.raw
        connection_id: tools.connection_id
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
