naftiko: 1.0.0-alpha2
info:
  label: Unified.to  API — call
  description: 'Unified.to  API — call. 2 operations. Lead operation: List All Calls. Self-contained Naftiko capability covering
    one Unified To business surface.'
  tags:
  - Unified To
  - call
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNIFIED_TO_API_KEY: UNIFIED_TO_API_KEY
capability:
  consumes:
  - type: http
    namespace: full-call
    baseUri: https://api.unified.to
    description: Unified.to  API — call business capability. Self-contained, no shared references.
    resources:
    - name: uc-connection_id-call
      path: /uc/{connection_id}/call
      operations:
      - name: listuccalls
        method: GET
        description: List All Calls
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: number
        - name: offset
          in: query
          type: number
        - name: updated_gte
          in: query
          type: string
          description: Return only results whose updated date is equal or greater to this value (ISO-8601 / YYYY-MM-DDTHH:MM:SSZ
            format)
        - name: sort
          in: query
          type: string
        - name: order
          in: query
          type: string
        - name: query
          in: query
          type: string
          description: Query string to search. eg. email address or name
        - name: user_id
          in: query
          type: string
          description: The user/employee ID to filter by (reference to HrisEmployee)
        - name: contact_id
          in: query
          type: string
          description: The contact ID to filter by (reference to UcContact)
        - name: start_gte
          in: query
          type: string
          description: The start date to filter by (ISO-8601 / YYYY-MM-DDTHH:MM:SSZ format)
        - name: end_lt
          in: query
          type: string
          description: The end date to filter by (ISO-8601 / YYYY-MM-DDTHH:MM:SSZ format)
        - name: fields
          in: query
          type: array
          description: Fields to return
        - name: raw
          in: query
          type: string
          description: 'Raw parameters to include in the 3rd-party request. Encoded as a URL component. eg. raw parameters:
            foo=bar&zoo=bar -> raw=foo%3Dbar%26zoo%3Dbar'
        - name: connection_id
          in: path
          type: string
          description: ID of the connection
          required: true
    - name: uc-connection_id-call-id
      path: /uc/{connection_id}/call/{id}
      operations:
      - name: getuccall
        method: GET
        description: Retrieve a Call
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: Fields to return
        - name: raw
          in: query
          type: string
          description: 'Raw parameters to include in the 3rd-party request. Encoded as a URL component. eg. raw parameters:
            foo=bar&zoo=bar -> raw=foo%3Dbar%26zoo%3Dbar'
        - name: connection_id
          in: path
          type: string
          description: ID of the connection
          required: true
        - name: id
          in: path
          type: string
          description: ID of the Call
          required: true
    authentication:
      type: apikey
      key: authorization
      value: '{{env.UNIFIED_TO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: full-call-rest
    port: 8080
    description: REST adapter for Unified.to  API — call. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/uc/{connection-id}/call
      name: uc-connection-id-call
      description: REST surface for uc-connection_id-call.
      operations:
      - method: GET
        name: listuccalls
        description: List All Calls
        call: full-call.listuccalls
        with:
          limit: rest.limit
          offset: rest.offset
          updated_gte: rest.updated_gte
          sort: rest.sort
          order: rest.order
          query: rest.query
          user_id: rest.user_id
          contact_id: rest.contact_id
          start_gte: rest.start_gte
          end_lt: rest.end_lt
          fields: rest.fields
          raw: rest.raw
          connection_id: rest.connection_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/uc/{connection-id}/call/{id}
      name: uc-connection-id-call-id
      description: REST surface for uc-connection_id-call-id.
      operations:
      - method: GET
        name: getuccall
        description: Retrieve a Call
        call: full-call.getuccall
        with:
          fields: rest.fields
          raw: rest.raw
          connection_id: rest.connection_id
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: full-call-mcp
    port: 9090
    transport: http
    description: MCP adapter for Unified.to  API — call. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-all-calls
      description: List All Calls
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: full-call.listuccalls
      with:
        limit: tools.limit
        offset: tools.offset
        updated_gte: tools.updated_gte
        sort: tools.sort
        order: tools.order
        query: tools.query
        user_id: tools.user_id
        contact_id: tools.contact_id
        start_gte: tools.start_gte
        end_lt: tools.end_lt
        fields: tools.fields
        raw: tools.raw
        connection_id: tools.connection_id
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-call
      description: Retrieve a Call
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: full-call.getuccall
      with:
        fields: tools.fields
        raw: tools.raw
        connection_id: tools.connection_id
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
