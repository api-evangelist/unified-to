      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: it-ops-commit.patchrepocommit
      with:
        fields: tools.fields
        raw: tools.raw
        connection_id: tools.connection_id
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-commit-2
      description: Update a commit
      hints:
        readOnly: false
