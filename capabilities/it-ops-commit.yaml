        name: updaterepocommit
        description: Update a commit
        call: it-ops-commit.updaterepocommit
        with:
          fields: rest.fields
          raw: rest.raw
          connection_id: rest.connection_id
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
