naftiko: 1.0.0-alpha2
info:
  label: Unified.to  API — report
  description: 'Unified.to  API — report. 2 operations. Lead operation: List all reports. Self-contained Naftiko capability
    covering one Unified To business surface.'
  tags:
  - Unified To
  - report
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNIFIED_TO_API_KEY: UNIFIED_TO_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-report
    baseUri: https://api.unified.to
    description: Unified.to  API — report business capability. Self-contained, no shared references.
    resources:
    - name: ads-connection_id-report
      path: /ads/{connection_id}/report
      operations:
      - name: listadsreports
        method: GET
        description: List all reports
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: number
        - name: offset
          in: query
          type: number
        - name: updated_gte
          in: query
          type: string
          description: Return only results whose updated date is equal or greater to this value (ISO-8601 / YYYY-MM-DDTHH:MM:SSZ
            format)
        - name: sort
          in: query
          type: string
        - name: order
          in: query
          type: string
        - name: query
          in: query
          type: string
          description: Query string to search. eg. email address or name
        - name: org_id
          in: query
          type: string
          description: The org ID to filter by (reference to AdsOrganization)
        - name: campaign_id
          in: query
          type: string
          description: The campaign ID to filter by
        - name: group_id
          in: query
          type: string
          description: The group ID to filter by (reference to AdsGroup)
        - name: ad_id
          in: query
          type: string
          description: The ad ID to filter by
        - name: type
          in: query
          type: string
        - name: start_gte
          in: query
          type: string
          description: The start date to filter by (ISO-8601 / YYYY-MM-DDTHH:MM:SSZ format)
        - name: end_lt
          in: query
          type: string
          description: The end date to filter by (ISO-8601 / YYYY-MM-DDTHH:MM:SSZ format)
        - name: fields
          in: query
          type: array
          description: Fields to return
        - name: raw
          in: query
          type: string
          description: 'Raw parameters to include in the 3rd-party request. Encoded as a URL component. eg. raw parameters:
            foo=bar&zoo=bar -> raw=foo%3Dbar%26zoo%3Dbar'
        - name: connection_id
          in: path
          type: string
          description: ID of the connection
          required: true
    - name: martech-connection_id-report
      path: /martech/{connection_id}/report
      operations:
      - name: listmartechreports
        method: GET
        description: List all reports
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: number
        - name: offset
          in: query
          type: number
        - name: updated_gte
          in: query
          type: string
          description: Return only results whose updated date is equal or greater to this value (ISO-8601 / YYYY-MM-DDTHH:MM:SSZ
            format)
        - name: sort
          in: query
          type: string
        - name: order
          in: query
          type: string
        - name: query
          in: query
          type: string
          description: Query string to search. eg. email address or name
        - name: campaign_id
          in: query
          type: string
          description: The campaign ID to filter by
        - name: list_id
          in: query
          type: string
          description: The list ID to filter by
        - name: start_gte
          in: query
          type: string
          description: The start date to filter by (ISO-8601 / YYYY-MM-DDTHH:MM:SSZ format)
        - name: end_lt
          in: query
          type: string
          description: The end date to filter by (ISO-8601 / YYYY-MM-DDTHH:MM:SSZ format)
        - name: fields
          in: query
          type: array
          description: Fields to return
        - name: raw
          in: query
          type: string
          description: 'Raw parameters to include in the 3rd-party request. Encoded as a URL component. eg. raw parameters:
            foo=bar&zoo=bar -> raw=foo%3Dbar%26zoo%3Dbar'
        - name: connection_id
          in: path
          type: string
          description: ID of the connection
          required: true
    authentication:
      type: apikey
      key: authorization
      value: '{{env.UNIFIED_TO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: marketing-report-rest
    port: 8080
    description: REST adapter for Unified.to  API — report. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/ads/{connection-id}/report
      name: ads-connection-id-report
      description: REST surface for ads-connection_id-report.
      operations:
      - method: GET
        name: listadsreports
        description: List all reports
        call: marketing-report.listadsreports
        with:
          limit: rest.limit
          offset: rest.offset
          updated_gte: rest.updated_gte
          sort: rest.sort
          order: rest.order
          query: rest.query
          org_id: rest.org_id
          campaign_id: rest.campaign_id
          group_id: rest.group_id
          ad_id: rest.ad_id
          type: rest.type
          start_gte: rest.start_gte
          end_lt: rest.end_lt
          fields: rest.fields
          raw: rest.raw
          connection_id: rest.connection_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/martech/{connection-id}/report
      name: martech-connection-id-report
      description: REST surface for martech-connection_id-report.
      operations:
      - method: GET
        name: listmartechreports
        description: List all reports
        call: marketing-report.listmartechreports
        with:
          limit: rest.limit
          offset: rest.offset
          updated_gte: rest.updated_gte
          sort: rest.sort
          order: rest.order
          query: rest.query
          campaign_id: rest.campaign_id
          list_id: rest.list_id
          start_gte: rest.start_gte
          end_lt: rest.end_lt
          fields: rest.fields
          raw: rest.raw
          connection_id: rest.connection_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-report-mcp
    port: 9090
    transport: http
    description: MCP adapter for Unified.to  API — report. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-all-reports
      description: List all reports
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-report.listadsreports
      with:
        limit: tools.limit
        offset: tools.offset
        updated_gte: tools.updated_gte
        sort: tools.sort
        order: tools.order
        query: tools.query
        org_id: tools.org_id
        campaign_id: tools.campaign_id
        group_id: tools.group_id
        ad_id: tools.ad_id
        type: tools.type
        start_gte: tools.start_gte
        end_lt: tools.end_lt
        fields: tools.fields
        raw: tools.raw
        connection_id: tools.connection_id
      outputParameters:
      - type: object
        mapping: $.
    - name: list-all-reports-2
      description: List all reports
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-report.listmartechreports
      with:
        limit: tools.limit
        offset: tools.offset
        updated_gte: tools.updated_gte
        sort: tools.sort
        order: tools.order
        query: tools.query
        campaign_id: tools.campaign_id
        list_id: tools.list_id
        start_gte: tools.start_gte
        end_lt: tools.end_lt
        fields: tools.fields
        raw: tools.raw
        connection_id: tools.connection_id
      outputParameters:
      - type: object
        mapping: $.
